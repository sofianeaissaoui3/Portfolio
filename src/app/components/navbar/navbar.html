<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner">
    <a class="nav-logo" (click)="scrollTo('#hero')">S<span>.</span>A</a>

    <ul class="nav-links" [class.open]="menuOpen()">
      @for (link of navLinks(); track link.anchor) {
        <li><a (click)="scrollTo(link.anchor)">{{ link.label }}</a></li>
      }
    </ul>

    <div class="nav-right">
      <button class="lang-btn" (click)="langSvc.toggle()" [attr.aria-label]="'Switch language'">
        <span [class.lang-active]="langSvc.lang() === 'fr'">FR</span>
        <span class="lang-sep">|</span>
        <span [class.lang-active]="langSvc.lang() === 'en'">EN</span>
      </button>

      <button class="burger" (click)="menuOpen.set(!menuOpen())" [class.active]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
